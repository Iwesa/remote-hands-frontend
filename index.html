<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Remote Hands - Live Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex flex-col items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-gray-800 rounded-xl shadow-lg p-6 space-y-4">
        <h1 class="text-2xl font-bold text-center text-blue-400">The Remote Hands</h1>

        <div class="relative w-full aspect-video bg-black rounded-lg overflow-hidden">
            <video id="videoElement" autoplay playsinline muted class="w-full h-full object-cover"></video>
        </div>

        <canvas id="canvasElement" class="hidden"></canvas>

        <div class="flex justify-center space-x-4">
            <button id="startBtn" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-lg font-semibold transition">
                Start Session
            </button>
            <button id="stopBtn" disabled class="bg-red-600 hover:bg-red-500 px-6 py-2 rounded-lg font-semibold transition opacity-50 cursor-not-allowed">
                Stop
            </button>
        </div>

        <p id="status" class="text-center text-sm text-gray-400">Disconnected</p>
    </div>

    <script>
        let ws;
        let videoStream;
        let audioStream;
        let mediaRecorder;
        let frameInterval;
        let audioCtx

        const video = document.getElementById('videoElement');
        const canvas = document.getElementById('canvasElement');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusText = document.getElementById('status');

        async function startSession() {
            let nextPlayTime = 0;
            try {
                // Initialize Audio Context when session starts
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({sampleRate: 24000});
                await audioCtx.resume();

                // 1. Connect to the FastAPI WebSocket
                ws = new WebSocket("wss://remote-hands-backend-920423859996.us-central1.run.app");

                ws.onopen = () => {
                    statusText.innerText = "Connected to Gemini Live";
                    startBtn.disabled = true;
                    stopBtn.disabled = false;
                    startBtn.classList.add('opacity-50', 'cursor-not-allowed');
                    stopBtn.classList.remove('opacity-50', 'cursor-not-allowed');

                    // ws.send(JSON.stringify({
                    //     realtime_input: "Hello! I just connected. Please introduce yourself out loud and tell me you are ready to troubleshoot my surveying equipment"
                    // }))
                };
                
                // Handle incoming audio from Gemini (Conceptual playback)
                ws.onmessage = async (event) => {
                    try {
                        const message = JSON.parse(event.data);

                        if (message.type === 'audio'){
                            // Decode base64 to raw bytes
                            const binaryString = window.atob(message.data);
                            const len = binaryString.length;
                            const bytes = new Uint8Array(len);
                            for (let i = 0; i < len; i++) {
                                bytes[i] = binaryString.charCodeAt(i);
                            }
    
                            // Convert 16-bit PCM to Float32 for the Web Audio API
                            const bufferLength = Math.floor(len / 2);
                            const buffer = new Int16Array(bytes.buffer, 0, bufferLength);
                            const audioBuffer = audioCtx.createBuffer(1, buffer.length, 24000);
                            const channelData = audioBuffer.getChannelData(0);
                            for (let i = 0; i < buffer.length; i++){
                                channelData[i] = buffer[i] / 32768.0;
                            }
    
                            // Play it out loud
                            const source = audioCtx.createBufferSource();
                            source.buffer = audioBuffer;
                            source.connect(audioCtx.destination);
                            const currentTime = audioCtx.currentTime;
                            if (nextPlayTime < currentTime){
                                nextPlayTime = currentTime;
                            }
                            source.start(nextPlayTime);
                            nextPlayTime += audioBuffer.duration;
                        } else if (message.type === 'status') {
                            document.getElementById('status').innerText = message.data;
                        } else if (message.type === 'text'){
                            statusText.innerText = `Gemini: ${message.data}`;
                        }
                    } catch (err) {
                        statusText.innerText = `Audio Error: ${err.message}`
                    }
                };

                // 2. Request Camera & Mic permissions
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: {facingMode: {ideal: 'environment'}}, // Prioritize rear camera for "Remote Hands"
                    audio: true 
                });

                video.srcObject = stream;
                videoStream = stream;

                // 3. Extract and send Video Frames (1 FPS to avoid rate limits)
                frameInterval = setInterval(() => {
                    if (ws.readyState === WebSocket.OPEN) {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                        // Get base64 JPEG (stripping the data URI prefix)
                        const base64Image = canvas.toDataURL('image/jpeg', 0.4).split(',')[1];

                        ws.send(JSON.stringify({
                            realtime_input: {
                                mime_type: "image/jpeg",
                                data: base64Image
                            }
                        }));
                    }
                }, 1000); // 1 frame per second

                // 4. Capture and send Audio Chunks
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = async (e) => {
                    if (e.data.size > 0 && ws.readyState === WebSocket.OPEN) {
                        const buffer = await e.data.arrayBuffer();
                        // Convert ArrayBuffer to Base64
                        const base64Audio = btoa(String.fromCharCode(...new Uint8Array(buffer)));

                        ws.send(JSON.stringify({
                            realtime_input: {
                                mime_type: "audio/webm", // Note: Backend may need to transcode to PCM depending on strictness
                                data: base64Audio
                            }
                        }));
                    }
                };
                mediaRecorder.start(500); // Send an audio chunk every 500ms

            } catch (err) {
                console.error("Error accessing media devices.", err);
                statusText.innerText = "Error accessing camera/mic.";
                alert(`Camera/Mic Error: ${err.name} - ${err.message}`);
            }
        }

        function stopSession() {
            if (ws) ws.close();
            if (videoStream) videoStream.getTracks().forEach(track => track.stop());
            clearInterval(frameInterval);
            if (mediaRecorder) mediaRecorder.stop();

            statusText.innerText = "Disconnected";
            startBtn.disabled = false;
            stopBtn.disabled = true;
            stopBtn.classList.add('opacity-50', 'cursor-not-allowed');
            startBtn.classList.remove('opacity-50', 'cursor-not-allowed');
        }

        startBtn.addEventListener('click', startSession);
        stopBtn.addEventListener('click', stopSession);
    </script>
</body>
</html>
