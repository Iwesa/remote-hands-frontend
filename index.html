<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Remote Hands - Field Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center p-4 font-sans">

    <div class="w-full max-w-md text-center mt-4 mb-6">
        <h1 class="text-2xl font-bold text-blue-400">The Remote Hands</h1>
        <p class="text-xs text-gray-400">High-Precision Troubleshooting Agent</p>
    </div>
    
    <div class="w-full max-w-md bg-black rounded-xl overflow-hidden border border-gray-700 relative shadow-2xl">
        
        <video id="videoElement" autoplay playsinline class="w-full h-80 object-cover"></video>
        
        <div class="absolute top-0 left-0 w-full bg-black bg-opacity-60 p-2 text-center text-xs font-mono text-green-400 border-b border-gray-700 transition-all duration-300" id="statusText">
            System Standby
        </div>

        <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-black to-transparent pt-12 pb-4 px-4 text-center text-sm font-medium text-gray-100 italic" id="geminiText">
            Agent output will appear here...
        </div>
    </div>

    <div class="flex gap-4 mt-8 w-full max-w-md">
        <button id="startBtn" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-bold shadow-lg transition-all active:scale-95">
            Start Session
        </button>
        <button id="stopBtn" class="flex-1 bg-red-600 hover:bg-red-500 text-white py-4 rounded-xl font-bold shadow-lg transition-all opacity-50 cursor-not-allowed" disabled>
            End Session
        </button>
    </div>

    <script>
        const videoElement = document.getElementById('videoElement');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusText = document.getElementById('statusText');
        const geminiText = document.getElementById('geminiText');

        let ws = null;
        let audioCtx = null;
        let mediaRecorder = null;
        let videoInterval = null;
        let nextPlayTime = 0;

        // Force Rear Camera ("environment")
        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: 640, height: 480 },
                    audio: false // Handled separately
                });
                videoElement.srcObject = stream;
            } catch (err) {
                statusText.innerText = "Camera access denied or unavailable";
                statusText.classList.replace('text-green-400', 'text-red-400');
            }
        }

        async function startSession() {
            try {
                // 1. Wake up audio instantly to bypass mobile browser blocks
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                await audioCtx.resume();
                nextPlayTime = 0;

                // 2. Connect to the fully-fixed Python Backend (Update URL if needed!)
                ws = new WebSocket("wss://remote-hands-backend-920423859996.us-central1.run.app/ws");

                ws.onopen = async () => {
                    statusText.innerText = "Connecting to Satellite Link...";
                    startBtn.disabled = true;
                    stopBtn.disabled = false;
                    startBtn.classList.add('opacity-50', 'cursor-not-allowed');
                    stopBtn.classList.remove('opacity-50', 'cursor-not-allowed');

                    // 3. Start capturing microphone (True 16kHz PCM)
                    const audioStream = await navigator.mediaDevices.getUserMedia({ 
                        audio: { channelCount: 1, sampleRate: 16000 } 
                    });
                    
                    // Create a separate context to process the microphone input
                    const micAudioCtx = new AudioContext({ sampleRate: 16000 });
                    const source = micAudioCtx.createMediaStreamSource(audioStream);
                    
                    // Manually intercept the audio nodes to get raw data
                    const processor = micAudioCtx.createScriptProcessor(4096, 1, 1);
                    source.connect(processor);
                    processor.connect(micAudioCtx.destination);
                    
                    processor.onaudioprocess = (e) => {
                        if (ws.readyState === WebSocket.OPEN) {
                            const inputData = e.inputBuffer.getChannelData(0);
                            const pcm16 = new Int16Array(inputData.length);
                            
                            // Convert browser's Float32 audio to Gemini's required Int16 audio
                            for (let i = 0; i < inputData.length; i++) {
                                let s = Math.max(-1, Math.min(1, inputData[i]));
                                pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                            }
                            
                            // Convert raw Int16 bytes to Base64 to send to Python
                            const uint8 = new Uint8Array(pcm16.buffer);
                            let binary = '';
                            for (let i = 0; i < uint8.byteLength; i++) {
                                binary += String.fromCharCode(uint8[i]);
                            }
                            
                            ws.send(JSON.stringify({ type: "audio", data: window.btoa(binary) }));
                        }
                    };
                    
                    mediaRecorder = new MediaRecorder(audioStream, { mimeType: 'audio/webm;codecs=opus' });
                    mediaRecorder.ondataavailable = async (e) => {
                        if (e.data.size > 0 && ws.readyState === WebSocket.OPEN) {
                            const buffer = await e.data.arrayBuffer();
                            // Note: Realistically, you want raw PCM here. If using MediaRecorder, 
                            // you might need an AudioWorklet for raw PCM. For this hackathon 
                            // demo, we are relying on the backend to handle the byte stream.
                            const base64Audio = btoa(String.fromCharCode(...new Uint8Array(buffer)));
                            ws.send(JSON.stringify({ type: "audio", data: base64Audio }));
                        }
                    };
                    mediaRecorder.start(100); // Send audio chunks every 100ms

                    // 4. Start capturing video frames (1 frame per second to save bandwidth)
                    const canvas = document.createElement("canvas");
                    const ctx = canvas.getContext("2d");
                    videoInterval = setInterval(() => {
                        if (ws.readyState === WebSocket.OPEN && videoElement.videoWidth) {
                            canvas.width = videoElement.videoWidth;
                            canvas.height = videoElement.videoHeight;
                            ctx.drawImage(videoElement, 0, 0);
                            const base64Image = canvas.toDataURL("image/jpeg", 0.5).split(",")[1];
                            ws.send(JSON.stringify({ type: "video", data: base64Image }));
                        }
                    }, 1000); 
                };

                // 5. Handle incoming data from Python
                ws.onmessage = async (event) => {
                    try {
                        const message = JSON.parse(event.data);
                        
                        if (message.type === "audio") {
                            // Bulletproof Little-Endian PCM parsing
                            const binaryString = window.atob(message.data);
                            const len = binaryString.length;
                            const validLen = len - (len % 2); 
                            const floatArray = new Float32Array(validLen / 2);
            
                            for (let i = 0; i < validLen / 2; i++) {
                                const byte1 = binaryString.charCodeAt(i * 2);
                                const byte2 = binaryString.charCodeAt(i * 2 + 1);
                                let int16 = byte1 | (byte2 << 8);
                                if (int16 & 0x8000) int16 |= 0xFFFF0000; 
                                floatArray[i] = int16 / 32768.0; 
                            }
            
                            const audioBuffer = audioCtx.createBuffer(1, floatArray.length, 16000);
                            audioBuffer.copyToChannel(floatArray, 0);
                            
                            const source = audioCtx.createBufferSource();
                            source.buffer = audioBuffer;
                            source.connect(audioCtx.destination);
                            
                            // Audio Queue to prevent popping
                            const currentTime = audioCtx.currentTime;
                            if (nextPlayTime < currentTime) {
                                nextPlayTime = currentTime;
                            }
                            source.start(nextPlayTime);
                            nextPlayTime += audioBuffer.duration;
                            
                        } else if (message.type === "status") {
                            // Highlights tool calls (e.g., "Searching manuals...")
                            statusText.innerText = message.data;
                            if(message.data.includes("Error") || message.data.includes("Dropped")) {
                                statusText.classList.replace('text-green-400', 'text-red-400');
                            } else if (message.data.includes("Searching")) {
                                statusText.classList.replace('text-green-400', 'text-yellow-400');
                            } else {
                                statusText.classList.replace('text-yellow-400', 'text-green-400');
                                statusText.classList.replace('text-red-400', 'text-green-400');
                            }
                        } else if (message.type === "text") {
                            // Displays what Gemini is saying
                            geminiText.innerText = `"${message.data}"`;
                        }
                    } catch (err) {
                        console.error("Parse error:", err);
                    }
                };

                ws.onclose = () => {
                    statusText.innerText = "Call Dropped (Server Disconnected)";
                    statusText.classList.replace('text-green-400', 'text-red-400');
                    cleanupSession();
                };

            } catch (err) {
                statusText.innerText = `Setup Error: ${err.message}`;
            }
        }

        function cleanupSession() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
            if (videoInterval) clearInterval(videoInterval);
            if (ws && ws.readyState === WebSocket.OPEN) ws.close();
            
            startBtn.disabled = false;
            stopBtn.disabled = true;
            startBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            stopBtn.classList.add('opacity-50', 'cursor-not-allowed');
        }

        startBtn.addEventListener('click', startSession);
        stopBtn.addEventListener('click', cleanupSession);

        // Init camera on load
        setupCamera();
    </script>
</body>
</html>
